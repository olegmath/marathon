<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Марафон Рейтинг</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #6DCFF0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      color: #1a1a1a;
    }

    :root {
      --blue: #6DCFF0;
      --blue-dark: #3BAED4;
      --blue-text: #4AB8E0;
      --white: #ffffff;
      --gray-line: rgba(0,0,0,0.1);
    }

    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Top nav */
    .top-nav {
      padding: 20px 32px 0;
      display: flex;
      align-items: flex-start;
      gap: 20px;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .nav-left {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .subject-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .subject-btn {
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      font-size: 14px;
      font-style: italic;
      letter-spacing: 0.5px;
      padding: 6px 16px;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s ease;
      background: rgba(255,255,255,0.25);
      color: white;
    }

    .subject-btn.active {
      background: white;
      color: #3595B8;
      box-shadow: 0 2px 10px rgba(0,80,120,0.15);
    }

    .exam-toggle {
      display: flex;
      background: rgba(255,255,255,0.2);
      border-radius: 30px;
      padding: 3px;
      gap: 3px;
      width: fit-content;
    }

    .exam-btn {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 16px;
      font-style: italic;
      padding: 5px 28px;
      border-radius: 26px;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
      background: transparent;
      color: white;
    }

    .exam-btn.active {
      background: white;
      color: #3595B8;
      box-shadow: 0 2px 8px rgba(0,80,120,0.15);
    }

    .rating-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .scope-toggle {
      display: flex;
      background: rgba(255,255,255,0.2);
      border-radius: 30px;
      padding: 3px;
      gap: 3px;
      width: fit-content;
    }

    .scope-btn {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 14px;
      font-style: italic;
      padding: 5px 18px;
      border-radius: 26px;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
      background: transparent;
      color: white;
      white-space: nowrap;
    }

    .scope-btn.active {
      background: white;
      color: #3595B8;
      box-shadow: 0 2px 8px rgba(0,80,120,0.15);
    }

    .teacher-select {
      min-width: 220px;
      max-width: 320px;
      height: 36px;
      padding: 0 36px 0 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.45);
      background: rgba(255,255,255,0.25);
      color: white;
      font-family: 'Oswald', sans-serif;
      font-size: 14px;
      font-weight: 600;
      font-style: italic;
      outline: none;
      cursor: pointer;
    }

    .teacher-select option {
      color: #1a1a1a;
      background: white;
    }

    .title-section {
      text-align: right;
      line-height: 1;
      flex-shrink: 0;
    }

    .title-heading {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 14px;
    }

    .main-title {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 40px;
      font-style: italic;
      color: white;
      letter-spacing: 2px;
      text-shadow: 0 2px 8px rgba(0,80,120,0.2);
      line-height: 0.9;
    }

    .subtitle {
      font-family: 'Oswald', sans-serif;
      font-weight: 500;
      font-size: 15px;
      color: rgba(255,255,255,0.85);
      letter-spacing: 3px;
      margin-top: 6px;
      text-transform: uppercase;
    }

    .update-section {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      justify-content: flex-end;
    }

    .refresh-btn {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      font-weight: bold;
    }

    .refresh-btn:hover {
      background: rgba(255,255,255,0.3);
      border-color: rgba(255,255,255,0.5);
    }

    .refresh-btn:active {
      transform: scale(0.95);
    }

    .refresh-btn.loading {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .last-update {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      white-space: nowrap;
    }

    /* Logo */
    .logo {
      width: 74px;
      height: auto;
      opacity: 0.9;
      flex-shrink: 0;
      pointer-events: none;
    }

    /* Columns container */
    .columns-container {
      display: flex;
      gap: 16px;
      padding: 16px 32px 48px;
      flex: 1;
      align-items: flex-start;
    }

    /* Rating column */
    .rating-column {
      background: white;
      border-radius: 20px;
      padding: 20px 18px 16px;
      flex: 1;
      min-width: 0;
      box-shadow: 0 4px 20px rgba(0,80,120,0.12);
      display: flex;
      flex-direction: column;
    }

    .column-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
    }

    .column-title {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 20px;
      font-style: italic;
      color: #4AB8E0;
      letter-spacing: 0.5px;
      line-height: 1;
      white-space: nowrap;
    }

    .column-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .column-icon svg {
      width: 100%;
      height: 100%;
    }

    .column-extra {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 18px;
      color: #4AB8E0;
      margin-left: 4px;
      letter-spacing: -1px;
    }

    .column-subheader {
      display: grid;
      grid-template-columns: 52px 1fr;
      gap: 8px;
      margin-bottom: 6px;
    }

    .subheader-place {
      font-size: 9px;
      font-family: 'Oswald', sans-serif;
      font-weight: 500;
      color: #4AB8E0;
      letter-spacing: 0.3px;
      line-height: 1.2;
      text-transform: uppercase;
    }

    .subheader-name {
      font-size: 9px;
      font-family: 'Oswald', sans-serif;
      font-weight: 500;
      color: #4AB8E0;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      display: flex;
      align-items: flex-end;
    }

    .column-divider {
      height: 1px;
      background: rgba(74,184,224,0.3);
      margin-bottom: 8px;
    }

    .players-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0px;
    }

    .player-item {
      display: grid;
      grid-template-columns: 52px 1fr;
      gap: 8px;
      padding: 6px 0;
      align-items: center;
    }

    .player-place {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 22px;
      color: #1a1a1a;
      line-height: 1;
    }

    .player-info {
      display: flex;
      flex-direction: column;
    }

    .player-name {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 14px;
      color: #1a1a1a;
      line-height: 1.2;
      font-style: italic;
    }

    .player-score {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 12px;
      color: #4AB8E0;
      margin-top: 1px;
    }

    .player-divider {
      height: 1px;
      background: rgba(0,0,0,0.07);
      margin: 0;
    }

    .empty-slot {
      height: 36px;
      display: flex;
      align-items: center;
    }

    .empty-line {
      height: 1px;
      background: rgba(0,0,0,0.06);
      width: 100%;
      margin-top: 18px;
    }

    .details-panel {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .details-filters {
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 10px;
      background: white;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 4px 20px rgba(0,80,120,0.12);
    }

    .admin-period-panel {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      background: white;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 4px 20px rgba(0,80,120,0.12);
    }

    .period-controls {
      display: flex;
      align-items: end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .data-source-control {
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-family: 'Oswald', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: #4AB8E0;
      text-transform: uppercase;
    }

    .data-source-toggle {
      display: flex;
      gap: 4px;
      padding: 3px;
      border-radius: 10px;
      background: rgba(74,184,224,0.1);
    }

    .data-source-btn {
      height: 30px;
      border: none;
      border-radius: 7px;
      padding: 0 12px;
      background: transparent;
      color: #3595B8;
      font-family: 'Oswald', sans-serif;
      font-size: 13px;
      font-weight: 700;
      font-style: italic;
      cursor: pointer;
      white-space: nowrap;
    }

    .data-source-btn.active {
      background: #4AB8E0;
      color: white;
      box-shadow: 0 2px 8px rgba(0,80,120,0.12);
    }

    .data-source-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .period-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-family: 'Oswald', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: #4AB8E0;
      text-transform: uppercase;
    }

    .period-input {
      width: 160px;
      height: 36px;
      border: 1px solid rgba(74,184,224,0.28);
      border-radius: 8px;
      background: white;
      color: #1a1a1a;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      padding: 0 10px;
      outline: none;
    }

    .period-apply-btn,
    .period-reset-btn,
    .cache-clear-btn {
      height: 36px;
      border: none;
      border-radius: 8px;
      padding: 0 14px;
      font-family: 'Oswald', sans-serif;
      font-size: 13px;
      font-weight: 700;
      font-style: italic;
      cursor: pointer;
      white-space: nowrap;
    }

    .period-apply-btn {
      background: #4AB8E0;
      color: white;
    }

    .period-reset-btn {
      background: rgba(74,184,224,0.12);
      color: #3595B8;
    }

    .cache-clear-btn {
      background: #D33E5F;
      color: white;
    }

    .period-apply-btn:disabled,
    .period-reset-btn:disabled,
    .cache-clear-btn:disabled,
    .period-input:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .pdf-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      background: white;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 4px 20px rgba(0,80,120,0.12);
    }

    .pdf-action-btn {
      height: 40px;
      border: none;
      border-radius: 8px;
      padding: 0 16px;
      background: #4AB8E0;
      color: white;
      font-family: 'Oswald', sans-serif;
      font-size: 14px;
      font-weight: 700;
      font-style: italic;
      cursor: pointer;
      white-space: nowrap;
    }

    .pdf-action-btn.secondary {
      background: #7F62C7;
    }

    .pdf-action-btn.telegram {
      background: #2AABEE;
    }

    .pdf-action-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .pdf-action-note {
      color: rgba(0,0,0,0.58);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
    }

    .admin-load-summary {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      color: rgba(0,0,0,0.58);
    }

    .admin-load-pill {
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(74,184,224,0.1);
      color: #267ea0;
      font-weight: 600;
    }

    .admin-load-pill.error {
      background: rgba(211,62,95,0.11);
      color: #D33E5F;
    }

    .details-filter {
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-family: 'Oswald', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: #4AB8E0;
      text-transform: uppercase;
    }

    .details-select {
      height: 36px;
      border: 1px solid rgba(74,184,224,0.28);
      border-radius: 8px;
      background: white;
      color: #1a1a1a;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      padding: 0 10px;
      outline: none;
    }

    .details-table-wrap {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,80,120,0.12);
      overflow: auto;
      max-height: 54vh;
    }

    .details-table {
      width: 100%;
      min-width: 1180px;
      border-collapse: collapse;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
    }

    .details-table th,
    .details-table td {
      border-bottom: 1px solid rgba(0,0,0,0.06);
      border-right: 1px solid rgba(0,0,0,0.04);
      padding: 9px 10px;
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
    }

    .details-table th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f8fcfe;
      color: #1a1a1a;
      font-family: 'Oswald', sans-serif;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
    }

    .details-table th.numeric,
    .details-table td.numeric {
      text-align: right;
    }

    .details-table tr:hover td {
      background: rgba(74,184,224,0.06);
    }

    .penalty-cell {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      min-width: 94px;
    }

    .penalty-input {
      width: 64px;
      height: 28px;
      border: 1px solid rgba(74,184,224,0.28);
      border-radius: 8px;
      background: white;
      color: #1a1a1a;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      text-align: right;
      padding: 0 7px;
      outline: none;
    }

    .penalty-input:focus {
      border-color: #4AB8E0;
      box-shadow: 0 0 0 2px rgba(74,184,224,0.14);
    }

    .penalty-input.overridden {
      border-color: #D33E5F;
      background: rgba(211,62,95,0.06);
    }

    .penalty-reset-btn {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 8px;
      background: rgba(74,184,224,0.12);
      color: #3595B8;
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
    }

    .penalty-reset-btn:hover {
      background: rgba(74,184,224,0.22);
    }

    .details-table-empty {
      background: white;
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      color: rgba(0,0,0,0.55);
      font-family: 'Inter', sans-serif;
      box-shadow: 0 4px 20px rgba(0,80,120,0.12);
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(160px, 1fr));
      gap: 10px;
    }

    .metric-card {
      background: white;
      border-radius: 12px;
      padding: 14px 16px 16px;
      box-shadow: 0 4px 20px rgba(0,80,120,0.12);
    }

    .metric-title {
      font-family: 'Oswald', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 5px;
    }

    .metric-value {
      font-family: 'Oswald', sans-serif;
      font-size: 38px;
      font-weight: 700;
      line-height: 1;
    }

    .metric-value.blue { color: #4AB8E0; }
    .metric-value.pink { color: #E95797; }
    .metric-value.green { color: #63D45B; }
    .metric-value.purple { color: #7F62C7; }

    .admin-login {
      width: min(420px, 100%);
      margin: 44px auto 0;
      background: white;
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 4px 20px rgba(0,80,120,0.12);
    }

    .admin-login-title {
      font-family: 'Oswald', sans-serif;
      font-size: 24px;
      font-weight: 700;
      font-style: italic;
      color: #4AB8E0;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .admin-login-form {
      display: flex;
      gap: 8px;
    }

    .admin-password-input {
      flex: 1;
      min-width: 0;
      height: 40px;
      border: 1px solid rgba(74,184,224,0.32);
      border-radius: 8px;
      padding: 0 12px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
    }

    .admin-login-btn,
    .admin-logout-btn {
      height: 40px;
      border: none;
      border-radius: 8px;
      padding: 0 16px;
      background: #4AB8E0;
      color: white;
      font-family: 'Oswald', sans-serif;
      font-size: 14px;
      font-weight: 700;
      font-style: italic;
      cursor: pointer;
      white-space: nowrap;
    }

    .admin-login-error {
      display: none;
      margin-top: 10px;
      color: #D33E5F;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
    }

    .admin-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .admin-section-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .admin-section-btn {
      height: 40px;
      border: none;
      border-radius: 8px;
      padding: 0 16px;
      background: rgba(255,255,255,0.35);
      color: white;
      font-family: 'Oswald', sans-serif;
      font-size: 14px;
      font-weight: 700;
      font-style: italic;
      cursor: pointer;
      white-space: nowrap;
    }

    .admin-section-btn.active {
      background: white;
      color: #3595B8;
      box-shadow: 0 2px 10px rgba(0,80,120,0.15);
    }

    /* Background SVGs */
    .bg-diamonds-right {
      position: fixed;
      right: -20px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }

    .bg-diamonds-left {
      position: fixed;
      left: -60px;
      bottom: -40px;
      opacity: 0.08;
      pointer-events: none;
      z-index: 0;
    }

    /* Loading state */
    .state-loading .column-content {
      opacity: 0.5;
    }

    .state-loading .rating-column {
      opacity: 0.72;
    }

    .state-loading .empty-line {
      animation: loading-pulse 1.2s ease-in-out infinite;
      background: rgba(74,184,224,0.14);
    }

    .loading-status {
      width: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 4px 0 2px;
      color: white;
      font-family: 'Oswald', sans-serif;
      font-size: 18px;
      font-weight: 700;
      font-style: italic;
      letter-spacing: 0.4px;
      text-shadow: 0 2px 8px rgba(0,80,120,0.18);
    }

    .state-loading .loading-status {
      display: flex;
    }

    .loading-spinner {
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255,255,255,0.45);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes loading-pulse {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 0.95; }
    }

    /* Responsive */

<script src="config.js"></script>
<script>
  const PROXY_URL = 'https://script.google.com/macros/s/AKfycbyRMo1Sqm57vXg85VAtOYPDJ-PscpR1AuAGpcuCQmoT1WMuNeykYXaTpf8UPL5R8WPc_w/exec';
  const SOHOLMS_BACKEND_URL = String(window.SOHOLMS_BACKEND_URL || localStorage.getItem('soholmsBackendUrl') || '').replace(/\/$/, '');
  const DATA_SOURCE_STORAGE_KEY = 'marathonDataSource';
  const CONFIG_SOHOLMS_PERIOD_FROM = String(window.SOHOLMS_PERIOD_FROM || '');
  const CONFIG_SOHOLMS_PERIOD_TO = String(window.SOHOLMS_PERIOD_TO || '');
  let soholmsPeriodFrom = String(CONFIG_SOHOLMS_PERIOD_FROM || localStorage.getItem('soholmsPeriodFrom') || '');
  let soholmsPeriodTo = String(CONFIG_SOHOLMS_PERIOD_TO || localStorage.getItem('soholmsPeriodTo') || '');
  const defaultTeacherPeriod = getCurrentMonthPeriod();
  let teacherPeriodFrom = String(window.SOHOLMS_PERIOD_FROM || sessionStorage.getItem('teacherPeriodFrom') || defaultTeacherPeriod.from);
  let teacherPeriodTo = String(window.SOHOLMS_PERIOD_TO || sessionStorage.getItem('teacherPeriodTo') || defaultTeacherPeriod.to);
  const SOHOLMS_GROUP_IDS = String(window.SOHOLMS_GROUP_IDS || localStorage.getItem('soholmsGroupIds') || '');
  const SOHOLMS_SUBJECTS = String(window.SOHOLMS_SUBJECTS || localStorage.getItem('soholmsSubjects') || '');
  const SOHOLMS_ORIGINS = String(window.SOHOLMS_ORIGINS || localStorage.getItem('soholmsOrigins') || '');
  const SOHOLMS_LIMIT = String(window.SOHOLMS_LIMIT || localStorage.getItem('soholmsLimit') || '');
  const AUTO_REFRESH_MS = Number(window.AUTO_REFRESH_MS || localStorage.getItem('autoRefreshMs') || 24 * 60 * 60 * 1000);
  const PUBLIC_RATINGS_CACHE_PREFIX = 'marathonPublicRatingsCache:v2';
  const PUBLIC_RATINGS_CACHE_MAX_AGE_MS = Number(window.PUBLIC_RATINGS_CACHE_MAX_AGE_MS || 6 * 60 * 60 * 1000);

  const SUBJECTS = [
    { key: 'математика', label: 'Математика', levels: ['ЕГЭ', 'ОГЭ'] },
    { key: 'информатика', label: 'Информатика', levels: ['ЕГЭ', 'ОГЭ'] },
    { key: 'русский язык', label: 'Русский язык', levels: ['ЕГЭ', 'ОГЭ'] },
    { key: 'обществознание', label: 'Обществознание', levels: ['ЕГЭ', 'ОГЭ'] },
    { key: 'история', label: 'История', levels: ['ЕГЭ'] },
    { key: 'физика', label: 'Физика', levels: ['ЕГЭ', 'ОГЭ'] },
  ];

  function getSheetName(subject, level) {
    const shortMap = {
      'математика': 'мат',
      'информатика': 'инф',
      'русский язык': 'ря',
      'обществознание': 'общ',
      'история': 'ист',
      'физика': 'физ',
    };
    const shortName = shortMap[subject];
    return `${shortName} ${level}`;
  }

  function buildApiUrl(subject, level) {
    const sheetName = getSheetName(subject, level);
    return `${PROXY_URL}?mode=public&sheet=${encodeURIComponent(sheetName)}`;
  }

  function hasSoholmsBackend() {
    return SOHOLMS_BACKEND_URL.length > 0;
  }

  function normalizeDataSource(value) {
    return value === 'google' || value === 'soholms' ? value : '';
  }

  function getDefaultDataSource() {
    return hasSoholmsBackend() ? 'soholms' : 'google';
  }

  let selectedDataSource = normalizeDataSource(window.MARATHON_DATA_SOURCE || localStorage.getItem(DATA_SOURCE_STORAGE_KEY)) || getDefaultDataSource();
  if (selectedDataSource === 'soholms' && !hasSoholmsBackend()) {
    selectedDataSource = 'google';
  }

  function usesSoholmsSource() {
    return selectedDataSource === 'soholms' && hasSoholmsBackend();
  }

  function getDataSourceLabel() {
    if (selectedDataSource === 'google') return 'Google Sheets';
    return hasSoholmsBackend() ? 'Soholms' : 'Soholms не настроен';
  }

  function getBackendAdminKey() {
    return String(window.BACKEND_ADMIN_KEY || localStorage.getItem('backendAdminKey') || '');
  }

  function applyDataSource(source) {
    const normalizedSource = normalizeDataSource(source);
    if (!normalizedSource) return false;
    if (normalizedSource === 'soholms' && !hasSoholmsBackend()) return false;

    selectedDataSource = normalizedSource;
    localStorage.setItem(DATA_SOURCE_STORAGE_KEY, selectedDataSource);
    return true;
  }

  async function loadDataSourceSettings() {
    if (!hasSoholmsBackend()) return;

    try {
      const response = await fetch(`${SOHOLMS_BACKEND_URL}/api/settings`);
      const data = await response.json();
      if (!response.ok || !data.ok) {
        throw new Error(data.error || 'Не удалось загрузить настройки');
      }
      applyDataSource(data.dataSource);
    } catch (error) {
      console.warn('Не удалось загрузить источник данных с backend:', error.message || error);
    }
  }

  async function saveDataSourceSettings(source) {
    const adminKey = getBackendAdminKey();
    const response = await fetch(`${SOHOLMS_BACKEND_URL}/api/settings?_t=${Date.now()}`, {
      method: 'POST',
      headers: {
        'content-type': 'application/json',
        ...(adminKey ? { 'x-admin-key': adminKey } : {}),
      },
      body: JSON.stringify({ dataSource: source }),
    });
    const data = await response.json();
    if (!response.ok || !data.ok) {
      throw new Error(data.error || 'Не удалось сохранить источник данных');
    }
    return data;
  }

  function formatLocalDate(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  }

  function getCurrentMonthPeriod() {
    const now = new Date();
    return {
      from: formatLocalDate(new Date(now.getFullYear(), now.getMonth(), 1)),
      to: formatLocalDate(new Date(now.getFullYear(), now.getMonth() + 1, 0)),
    };
  }

  function getRequestPeriod(publicOnly) {
    if (publicOnly) {
      return {
        from: CONFIG_SOHOLMS_PERIOD_FROM,
        to: CONFIG_SOHOLMS_PERIOD_TO,
      };
    }
    if (!publicOnly && adminRole === 'teacher') {
      return {
        from: teacherPeriodFrom,
        to: teacherPeriodTo,
      };
    }
    return {
      from: soholmsPeriodFrom,
      to: soholmsPeriodTo,
    };
  }

  function buildSoholmsRatingsUrl(publicOnly = false, options = {}) {
    const cacheBust = options.cacheBust !== false;
    const refresh = Boolean(options.refresh);
    const params = new URLSearchParams();
    const period = getRequestPeriod(publicOnly);
    if (period.from) params.set('periodFrom', period.from);
    if (period.to) params.set('periodTo', period.to);
    if (SOHOLMS_GROUP_IDS) params.set('groupIds', SOHOLMS_GROUP_IDS);
    if (SOHOLMS_SUBJECTS) params.set('subjects', SOHOLMS_SUBJECTS);
    if (SOHOLMS_ORIGINS) params.set('origins', SOHOLMS_ORIGINS);
    if (SOHOLMS_LIMIT) params.set('limit', SOHOLMS_LIMIT);
    if (publicOnly) params.set('public', '1');
    if (publicOnly && refresh) params.set('refresh', '1');
    if (cacheBust) params.set('_t', String(Date.now()));
    return `${SOHOLMS_BACKEND_URL}/api/ratings?${params.toString()}`;
  }

  const EXAMS = ['ЕГЭ', 'ОГЭ'];
  const SCOPES = [
    { key: 'school', label: 'Школа' },
    { key: 'teacher', label: 'Преподаватель' },
  ];

  let appData = null;
  let teacherData = null;
  let allStudentRows = [];
  let currentSubject = 'физика';
  let currentExam = 'ОГЭ';
  let currentView = 'rating';
  let currentScope = 'school';
  let currentTeacher = '';
  let detailSubject = '';
  let detailExam = '';
  let detailTeacher = '';
  let detailGroup = '';
  let detailStudent = '';
  let detailSortKey = 'finalScore';
  let detailSortDirection = 'desc';
  let adminSection = 'details';
  let teacherRatingSubject = '';
  let teacherRatingExam = '';
  let teacherRatingSortKey = 'rating';
  let teacherRatingSortDirection = 'desc';
  let dailyProgressSubject = '';
  let dailyProgressExam = '';
  let dailyProgressTeacher = '';
  let dailyProgressSortKey = 'dateOrder';
  let dailyProgressSortDirection = 'asc';
  let pdfStudent = '';
  let adminToken = sessionStorage.getItem('adminToken') || '';
  let adminRole = sessionStorage.getItem('adminRole') || (adminToken ? 'admin' : '');
  let adminLoading = false;
  let adminError = '';
  let dataLoading = false;
  const penaltySavingRows = new Set();
  let adminLoadMeta = {
    period: null,
    groupCount: 0,
    rowCount: 0,
    errors: [],
    missingConfigNames: [],
  };
  let globalNullScoreStudents = []; // Для отслеживания студентов с null в cells[10]

  function canManageAdmin() {
    return adminRole === 'admin';
  }

  function canChangePeriod() {
    return adminRole === 'admin' || adminRole === 'teacher';
  }

  // SVG Icons
  const FlameIcon = () => `
    <svg width="22" height="28" viewBox="0 0 22 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M11 2C11 2 7 7 7 12C7 12 5 10 5.5 7C3 9.5 2 13 2 16C2 21.523 6.477 26 12 26C17.523 26 22 21.523 22 16C22 11 18 7.5 16 5.5C16.5 8 15 10 15 10C15 6 13 3.5 11 2Z" fill="white" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <path d="M12 13C12 13 14 15.5 13 18C12.3 19.8 11 20.5 11 22C9.5 20.5 9 18.5 10 16.5C10.8 14.8 12 13 12 13Z" fill="#4AB8E0" stroke="#111" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>
  `;

  const ThumbsIcon = () => `
    <svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M9 12L12 3C13.5 3 15 4.2 15 6V10H21C22.1 10 23 10.9 23 12L21 20C20.6 21.2 19.5 22 18.3 22H9V12Z" fill="white" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
      <path d="M6 12H3V22H6C6.6 22 7 21.6 7 21V13C7 12.4 6.6 12 6 12Z" fill="white" stroke="#111" stroke-width="2" stroke-linejoin="round"/>
    </svg>
  `;

  const TurtleIcon = () => `
    <svg width="30" height="24" viewBox="0 0 30 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="15" cy="12" rx="8" ry="6" fill="white" stroke="#111" stroke-width="2"/>
      <ellipse cx="15" cy="12" rx="4.5" ry="3.5" fill="none" stroke="#111" stroke-width="1.5"/>
      <line x1="15" y1="8.5" x2="15" y2="15.5" stroke="#111" stroke-width="1.2"/>
      <line x1="10.5" y1="12" x2="19.5" y2="12" stroke="#111" stroke-width="1.2"/>
      <circle cx="24" cy="10" r="3" fill="white" stroke="#111" stroke-width="2"/>
      <circle cx="25.2" cy="9" r="0.8" fill="#111"/>
      <path d="M7 13 Q4 14 3 16" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M10 7 Q8 4 6 4" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M20 7 Q22 4 24 4" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M10 17 Q8 20 6 20" stroke="#111" stroke-width="2" stroke-linecap="round"/>
      <path d="M20 17 Q22 20 24 20" stroke="#111" stroke-width="2" stroke-linecap="round"/>
    </svg>
  `;

  function extractGvizJson(text) {
    const start = text.indexOf('{');
    const end = text.lastIndexOf('}') + 1;
    if (start === -1 || end <= start) {
      throw new Error('Не удалось распарсить ответ API');
    }
    return JSON.parse(text.substring(start, end));
  }

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function getCellNumber(cell) {
    const value = cell?.v ?? cell?.f ?? cell?.fv;
    if (value === null || value === undefined || value === '') return 0;
    return Number(String(value).replace(',', '.')) || 0;
  }

  function formatNumber(value, digits = 2) {
    return Number(value || 0).toFixed(digits).replace('.', ',');
  }

  function uniqueSorted(values) {
    return [...new Set(values.filter(Boolean))].sort((a, b) => a.localeCompare(b, 'ru'));
  }

  function getScoreStatus(score) {
    if (score >= 95) return 'legends';
    if (score >= 45) return 'champs';
    return 'starters';
  }

  function createRankedStudents(students) {
    const sorted = [...students].sort((a, b) => b.score - a.score);
    let place = 0;
    let prevScore = null;

    return sorted.map((student) => {
      if (student.score !== prevScore) {
        place++;
        prevScore = student.score;
      }

      return {
        ...student,
        place,
        status: getScoreStatus(student.score),
      };
    });
  }

  function parseApiRows(rows) {
    const parsedRows = rows.map((row, index) => {
      const finalScore = Number(row.finalScore ?? row.score) || 0;
      const schoolPlace = Number(row.schoolPlace) || 0;
      return {
        ...row,
        localRowId: `${row.overrideKey || ''}::${index}`,
        penalty: Number(row.penalty) || 0,
        autoPenalty: Number(row.autoPenalty ?? row.penalty) || 0,
        penaltyOverridden: Boolean(row.penaltyOverridden),
        score: finalScore,
        finalScore,
        baseScore: Number(row.baseScore) || 0,
        groupPlace: Number(row.groupPlace) || 0,
        schoolPlace,
        place: schoolPlace,
        status: getScoreStatus(finalScore),
        dailyScores: Array.isArray(row.dailyScores)
          ? row.dailyScores.map((item) => ({
            ...item,
            score: Number(item.score) || 0,
            dateOrder: Number(item.dateOrder) || 0,
          }))
          : [],
      };
    });

    const needsFallbackPlaces = parsedRows.some((row) => !row.schoolPlace);
    if (!needsFallbackPlaces) return parsedRows;

    const grouped = new Map();
    for (const row of parsedRows) {
      const key = `${row.subject}||${row.level}`;
      if (!grouped.has(key)) grouped.set(key, []);
      grouped.get(key).push(row);
    }

    for (const groupRows of grouped.values()) {
      const sorted = [...groupRows].sort((a, b) => b.score - a.score);
      let place = 0;
      let previousScore = null;
      for (const row of sorted) {
        if (row.score !== previousScore) {
          place++;
          previousScore = row.score;
        }
        row.schoolPlace = place;
      }
    }

    return parsedRows.map((row) => ({
      ...row,
      place: row.schoolPlace,
    }));
  }

  function parseGvizData(gvizJson, subject, level) {
    const table = gvizJson.table;
    if (!table || !table.cols || !table.rows) {
      throw new Error('Неожиданный формат данных');
    }

    // DEBUG: выводим заголовки и структуру
    if (subject === 'математика' && level === 'ЕГЭ') {
      console.log(`📊 Структура таблицы (${subject} ${level}):`);
      console.log(`  - Всего столбцов: ${table.cols.length}`);
      console.log(`  - Заголовки:`, table.cols.map((col, i) => ({idx: i, label: col.label, id: col.id})).slice(0, 20));
      console.log(`  - First row cells count:`, table.rows[1]?.c?.length);
    }

    const rows = table.rows;
    const students = [];
    const nullScoreStudents = []; // Для отслеживания студентов с null в cells[10]

    // Столбец C (индекс 2) = Ученик, K (индекс 10) = итоговый балл,
    // L/M = места, N (индекс 13) = Преподаватель.
    for (let rowIdx = 1; rowIdx < rows.length; rowIdx++) { // Начинаем с 1 (2-я строка)
      const row = rows[rowIdx];
      const cells = row.c || [];

      const group = cells[1]?.v; // Столбец B
      const name = cells[2]?.v; // Столбец C
      const teacher = cells[13]?.v; // Столбец N

      // Берём балл из cells[10] — проверяем .v, затем .f, затем .fv
      let scoreCell = cells[10];
      let score = scoreCell?.v;

      // DEBUG: построчный дебаг для Перца Ивана и Демидова Дэниэла
      const isDebugStudent = (
        (name === 'Перец Иван' || name === 'Демидов Дэниэл') &&
        subject === 'математика' &&
        level === 'ЕГЭ'
      );

      if (isDebugStudent) {
        console.log(`\n🔍 ШАГ 1: Читаем row ${rowIdx}`);
        console.log(`   cells.length = ${cells.length}`);
        console.log(`   cells[0-12]:`, cells.slice(0, 13).map((c, i) => ({i, v: c?.v, f: c?.f})));
      }

      if (isDebugStudent) {
        console.log(`\n🔍 ШАГ 2: Извлекаем имя`);
        console.log(`   cells[2] = ${JSON.stringify(cells[2])}`);
        console.log(`   name = '${name}'`);
      }

      if (isDebugStudent) {
        console.log(`\n🔍 ШАГ 3: Извлекаем балл из cells[10]`);
        console.log(`   cells[10] = ${JSON.stringify(scoreCell)}`);
        console.log(`   cells[10].v = ${scoreCell?.v}`);
        console.log(`   cells[10].f = ${scoreCell?.f}`);
        console.log(`   score (before fallback) = ${score}`);
      }

      // Отслеживаем студентов с undefined/null в cells[10]
      if ((scoreCell === null || scoreCell === undefined) && name && name.toString().trim() !== '') {
        const studentInfo = {
          name: name.toString().trim(),
          subject,
          level,
          cells10: scoreCell,
          cells8: cells[8],
          cells9: cells[9]
        };
        nullScoreStudents.push(studentInfo);
        globalNullScoreStudents.push(studentInfo); // Добавляем в глобальный массив
      }

      if (score === null || score === undefined) {
        if (isDebugStudent) console.log(`\n🔍 ШАГ 4: Применяем fallback (score был null/undefined)`);

        // Пробуем .f (отформатированное значение)
        if (scoreCell?.f !== null && scoreCell?.f !== undefined) {
          score = String(scoreCell.f).replace(',', '.');
          if (isDebugStudent) console.log(`   Fallback 1: используем scoreCell.f = '${scoreCell.f}' → score = '${score}'`);
        }
        // Пробуем .fv (значение формулы)
        else if (scoreCell?.fv !== null && scoreCell?.fv !== undefined) {
          score = scoreCell.fv;
          if (isDebugStudent) console.log(`   Fallback 2: используем scoreCell.fv = ${scoreCell.fv}`);
        }
        else {
          if (isDebugStudent) console.log(`   ❌ Fallback не сработал! Нет .f и .fv`);
        }
      }

      if (isDebugStudent) {
        console.log(`\n🔍 ШАГ 5: Проверяем имя`);
        console.log(`   trim() = '${name?.toString().trim()}'`);
        console.log(`   isEmpty = ${!name || name.toString().trim() === ''}`);
      }

      if (!name || name.toString().trim() === '') {
        if (isDebugStudent) console.log(`\n   ⏭️  SKIP: имя пусто\n`);
        continue;
      }

      const finalName = name.toString().trim();
      const finalGroup = group?.toString().trim() || '';
      const finalTeacher = teacher?.toString().trim() || 'Без преподавателя';
      const finalScore = Number(score) || 0;

      if (isDebugStudent) {
        console.log(`\n🔍 ШАГ 6: Добавляем в массив`);
        console.log(`   name = '${finalName}'`);
        console.log(`   score (raw) = ${score}`);
        console.log(`   score (Number) = ${finalScore}`);
        console.log(`   students.push({name: '${finalName}', score: ${finalScore}})\n`);
      }

      students.push({
        subject,
        level,
        group: finalGroup,
        name: finalName,
        teacher: finalTeacher,
        daysDone: getCellNumber(cells[3]),
        daysTotal: getCellNumber(cells[4]),
        coefficient: getCellNumber(cells[5]),
        quality: getCellNumber(cells[6]),
        baseScore: getCellNumber(cells[8]),
        penalty: getCellNumber(cells[9]),
        finalScore,
        groupPlace: getCellNumber(cells[11]),
        schoolPlace: getCellNumber(cells[12]),
        score: finalScore,
      });
    }

    const result = createRankedStudents(students);

    // Возвращаем и студентов И информацию о null values
    result._nullScoreStudents = nullScoreStudents;
    return result;
  }

  function groupAndSort(students) {
    const grouped = {};

    for (const subject of SUBJECTS) {
      grouped[subject.key] = {};
      for (const level of subject.levels) {
        grouped[subject.key][level] = {
          legends: [],
          champs: [],
          starters: [],
        };
      }
    }

    for (const student of students) {
      const key = student.subject.toLowerCase();
      if (!grouped[key]) continue;
      if (!grouped[key][student.level]) continue;

      const category = grouped[key][student.level][student.status];
      if (category) {
        category.push(student);
      }
    }

    // Уже отсортировано в parseGvizData, но группируем по категориям
    for (const subjectKey in grouped) {
      for (const level in grouped[subjectKey]) {
        for (const status in grouped[subjectKey][level]) {
          grouped[subjectKey][level][status].sort((a, b) => b.score - a.score);
        }
      }
    }

    return grouped;
  }

  function groupTeacherRatings(students) {
    const grouped = {};

    for (const subject of SUBJECTS) {
      grouped[subject.key] = {};
      for (const level of subject.levels) {
        grouped[subject.key][level] = {};
      }
    }

    for (const student of students) {
      const key = student.subject.toLowerCase();
      if (!grouped[key]) continue;
      if (!grouped[key][student.level]) continue;

      const teacher = student.teacher || 'Без преподавателя';
      if (!grouped[key][student.level][teacher]) {
        grouped[key][student.level][teacher] = [];
      }
      grouped[key][student.level][teacher].push(student);
    }

    for (const subjectKey in grouped) {
      for (const level in grouped[subjectKey]) {
        for (const teacher in grouped[subjectKey][level]) {
          const ranked = createRankedStudents(grouped[subjectKey][level][teacher]);
          grouped[subjectKey][level][teacher] = {
            legends: ranked.filter((s) => s.status === 'legends'),
            champs: ranked.filter((s) => s.status === 'champs'),
            starters: ranked.filter((s) => s.status === 'starters'),
          };
        }
      }
    }

    return grouped;
  }

  function getSubjectLabel(subjectKey) {
    return SUBJECTS.find((subject) => subject.key === subjectKey)?.label || subjectKey;
  }

  function averageNumbers(values) {
    if (values.length === 0) return 0;
    return values.reduce((sum, value) => sum + Number(value || 0), 0) / values.length;
  }

  function buildTeacherRatingRows(rows) {
    const teachers = new Map();

    for (const row of rows) {
      const teacher = row.teacher || 'Без преподавателя';
      if (teacher === 'Без преподавателя') continue;

      if (!teachers.has(teacher)) {
        teachers.set(teacher, {
          teacher,
          groups: new Map(),
        });
      }

      const groupName = row.group || 'Без группы';
      const groupKey = `${row.subject}||${row.level}||${groupName}`;
      const teacherItem = teachers.get(teacher);

      if (!teacherItem.groups.has(groupKey)) {
        teacherItem.groups.set(groupKey, {
          subject: row.subject,
          level: row.level,
          group: groupName,
          totalScore: 0,
          studentCount: 0,
        });
      }

      const group = teacherItem.groups.get(groupKey);
      group.totalScore += Number(row.finalScore ?? row.score) || 0;
      group.studentCount++;
    }

    const ratings = [...teachers.values()].map((teacherItem) => {
      const groups = [...teacherItem.groups.values()].map((group) => ({
        ...group,
        label: `${getSubjectLabel(group.subject)} ${group.level} - ${group.group}`,
        averageScore: group.studentCount === 0 ? 0 : group.totalScore / group.studentCount,
      }));
      const sortedGroups = [...groups].sort((a, b) => b.averageScore - a.averageScore);
      const groupAverages = groups.map((group) => group.averageScore);
      const bestGroup = sortedGroups[0] || null;
      const worstGroup = sortedGroups[sortedGroups.length - 1] || null;

      return {
        teacher: teacherItem.teacher,
        rating: averageNumbers(groupAverages),
        groupCount: groups.length,
        studentCount: groups.reduce((sum, group) => sum + group.studentCount, 0),
        bestGroup: bestGroup?.label || '',
        bestGroupScore: bestGroup?.averageScore || 0,
        worstGroup: worstGroup?.label || '',
        worstGroupScore: worstGroup?.averageScore || 0,
      };
    });

    const sortedByRating = [...ratings].sort((a, b) => b.rating - a.rating);
    let place = 0;
    let previousRating = null;

    return sortedByRating.map((row) => {
      if (row.rating !== previousRating) {
        place++;
        previousRating = row.rating;
      }
      return { ...row, place };
    });
  }

  function buildDailyProgressRows(rows) {
    const studentCounts = new Map();
    const days = new Map();

    for (const row of rows) {
      const subjectLevelKey = `${row.subject}||${row.level}`;
      studentCounts.set(subjectLevelKey, (studentCounts.get(subjectLevelKey) || 0) + 1);

      for (const dailyScore of row.dailyScores || []) {
        const key = `${subjectLevelKey}||${dailyScore.dateKey}`;
        if (!days.has(key)) {
          days.set(key, {
            subject: row.subject,
            level: row.level,
            dateLabel: dailyScore.dateLabel,
            dateOrder: Number(dailyScore.dateOrder) || 0,
            totalScore: 0,
            filledCount: 0,
          });
        }

        const day = days.get(key);
        day.totalScore += Number(dailyScore.score) || 0;
        day.filledCount++;
      }
    }

    return [...days.values()]
      .filter((day) => day.filledCount > 0)
      .map((day) => {
        const subjectLevelKey = `${day.subject}||${day.level}`;
        const studentCount = studentCounts.get(subjectLevelKey) || 0;
        return {
          subject: day.subject,
          subjectLabel: getSubjectLabel(day.subject),
          level: day.level,
          dateLabel: day.dateLabel,
          dateOrder: day.dateOrder,
          averageScore: day.totalScore / day.filledCount,
          filledCount: day.filledCount,
          studentCount,
          filledPercent: studentCount === 0 ? 0 : day.filledCount / studentCount * 100,
        };
      });
  }

  function sortDetailRows(rows) {
    const direction = detailSortDirection === 'asc' ? 1 : -1;
    return [...rows].sort((a, b) => {
      const aValue = a[detailSortKey];
      const bValue = b[detailSortKey];

      if (typeof aValue === 'number' && typeof bValue === 'number') {
        return (aValue - bValue) * direction;
      }

      return String(aValue || '').localeCompare(String(bValue || ''), 'ru') * direction;
    });
  }

  function sortTeacherRatingRows(rows) {
    const direction = teacherRatingSortDirection === 'asc' ? 1 : -1;

  function average(rows, key) {

  function formatPenaltyInput(value) {
    const number = Number(value) || 0;

  function parsePenaltyInput(value) {
    const normalized = String(value || '').trim().replace(',', '.');
    const penalty = Number(normalized);
    if (!Number.isFinite(penalty) || penalty < 0) {
      throw new Error('Штраф должен быть неотрицательным числом');
    }
    return penalty;
  }

  function recalculateDetailScores() {
    for (const row of allStudentRows) {
      const finalScore = Math.max(0, Number(row.baseScore || 0) - Number(row.penalty || 0));
      row.finalScore = finalScore;
      row.score = finalScore;
      row.status = getScoreStatus(finalScore);
    }

    const groupedBySchool = new Map();
    const groupedByGroup = new Map();
    for (const row of allStudentRows) {
      const schoolKey = `${row.subject}||${row.level}`;
      const groupKey = `${schoolKey}||${row.group}`;
      if (!groupedBySchool.has(schoolKey)) groupedBySchool.set(schoolKey, []);
      if (!groupedByGroup.has(groupKey)) groupedByGroup.set(groupKey, []);
      groupedBySchool.get(schoolKey).push(row);
      groupedByGroup.get(groupKey).push(row);
    }

    const applyPlaces = (rows, key) => {
      const sorted = [...rows].sort((a, b) => b.finalScore - a.finalScore);
      let place = 0;
      let previousScore = null;
      for (const row of sorted) {
        if (row.finalScore !== previousScore) {
          place++;
          previousScore = row.finalScore;
        }
        row[key] = place;
      }
    };

    for (const rows of groupedBySchool.values()) applyPlaces(rows, 'schoolPlace');
    for (const rows of groupedByGroup.values()) applyPlaces(rows, 'groupPlace');
    for (const row of allStudentRows) row.place = row.schoolPlace;
  }

    if (studentGroups.length === 0) {

      render();
      return;
    }

    const title = studentName ? `Отчёт ${studentName}` : 'Отчёты по всем ученикам';
    const reportWindow = window.open('', '_blank');
    if (!reportWindow) {
      adminError = 'Браузер заблокировал новое окно для PDF';
      render();
      return;
    }
    reportWindow.document.open();
    reportWindow.document.write(buildPdfReportHtml(studentGroups, title));
    reportWindow.document.close();

  async function sendTelegramReport(studentName = '') {
    if (!canManageAdmin() || !usesSoholmsSource() || adminLoading) return;

    adminLoading = true;
    adminError = '';
    render();

    try {
      const params = new URLSearchParams();
      if (soholmsPeriodFrom) params.set('periodFrom', soholmsPeriodFrom);
      if (soholmsPeriodTo) params.set('periodTo', soholmsPeriodTo);
      const adminKey = getBackendAdminKey();
      const response = await fetch(`${SOHOLMS_BACKEND_URL}/api/telegram/send-report?${params.toString()}`, {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          ...(adminKey ? { 'x-admin-key': adminKey } : {}),
        },
        body: JSON.stringify({ studentName, format: 'pdf' }),
      });
      const data = await response.json();
      if (!response.ok || !data.ok) {
        const firstError = data.errors?.[0]?.error;
        throw new Error(firstError || data.error || 'Не удалось отправить Telegram-отчёт');
      }
      const missingText = data.missing?.length ? ` Не найден chat_id: ${data.missing.length}.` : '';
      adminError = `Telegram PDF: отправлено ${data.sent?.length || 0}.${missingText}`;
    } catch (error) {
      adminError = error.message || 'Не удалось отправить Telegram PDF';
    } finally {
      adminLoading = false;
      render();
    }
  }

  async function switchDataSource(source) {
    if (!canManageAdmin() || adminLoading || dataLoading) return;

    const normalizedSource = normalizeDataSource(source);
    if (!normalizedSource || normalizedSource === selectedDataSource) return;

    if (!hasSoholmsBackend()) {
      adminError = 'Backend настроек не подключён';
      render();
      return;
    }

    if (normalizedSource === 'soholms' && !hasSoholmsBackend()) {
      adminError = 'Soholms backend не настроен';
      render();
      return;
    }

    adminLoading = true;
    adminError = '';
    render();

    try {
      const settings = await saveDataSourceSettings(normalizedSource);
      applyDataSource(settings.dataSource);
      appData = null;
      teacherData = null;
      allStudentRows = [];
      globalNullScoreStudents = [];
      resetAdminLoadMeta();
      adminLoading = false;
      render();

      await loadData();
      if (adminToken) {
        await loadAdminData();
      }
    } catch (error) {
      adminError = error.message || 'Не удалось сохранить источник данных';
      adminLoading = false;
      render();
    }
  }

  function applyAdminPeriod() {
    if (!canChangePeriod() || !usesSoholmsSource()) return;

    const from = document.getElementById('admin-period-from')?.value || '';
    const to = document.getElementById('admin-period-to')?.value || '';

    if (adminRole === 'teacher') {
      teacherPeriodFrom = from;
      teacherPeriodTo = to;
      if (from) {
        sessionStorage.setItem('teacherPeriodFrom', from);
      } else {
        sessionStorage.removeItem('teacherPeriodFrom');
      }
      if (to) {
        sessionStorage.setItem('teacherPeriodTo', to);
      } else {
        sessionStorage.removeItem('teacherPeriodTo');
      }
      allStudentRows = [];
      resetAdminLoadMeta();
      loadAdminData();
      return;
    }

    if (from) {
      localStorage.setItem('soholmsPeriodFrom', from);
    } else {
      localStorage.removeItem('soholmsPeriodFrom');
    }

    if (to) {
      localStorage.setItem('soholmsPeriodTo', to);
    } else {
      localStorage.removeItem('soholmsPeriodTo');
    }

    location.reload();
  }

  function resetAdminPeriod() {
    if (!canChangePeriod() || !usesSoholmsSource()) return;

    if (adminRole === 'teacher') {
      const currentMonth = getCurrentMonthPeriod();
      teacherPeriodFrom = String(window.SOHOLMS_PERIOD_FROM || currentMonth.from);
      teacherPeriodTo = String(window.SOHOLMS_PERIOD_TO || currentMonth.to);
      sessionStorage.removeItem('teacherPeriodFrom');
      sessionStorage.removeItem('teacherPeriodTo');
      allStudentRows = [];
      resetAdminLoadMeta();
      loadAdminData();
      return;
    }

    localStorage.removeItem('soholmsPeriodFrom');
    localStorage.removeItem('soholmsPeriodTo');
    location.reload();
  }

  async function clearBackendCacheAndReload() {
    if (!canManageAdmin() || !usesSoholmsSource() || adminLoading) return;

    adminLoading = true;
    adminError = '';
    render();

    try {
      const adminKey = getBackendAdminKey();
      const response = await fetch(`${SOHOLMS_BACKEND_URL}/api/cache/clear?_t=${Date.now()}`, {
        headers: adminKey ? { 'x-admin-key': adminKey } : {},
      });
      const data = await response.json();
      if (!response.ok || !data.ok) {
        throw new Error(data.error || 'Не удалось очистить кеш');
      }

      allStudentRows = [];
      adminLoadMeta = {
        period: null,
        groupCount: 0,
        rowCount: 0,
        errors: [],
        missingConfigNames: [],
      };
      await loadData();
      if (adminToken) {
        await loadAdminData();
      }
    } catch (error) {
      adminError = error.message || 'Не удалось очистить кеш';
    } finally {
      adminLoading = false;
      render();
    }
  }

  async function savePenaltyOverride(rowIndex, rawValue, options = {}) {
    if (!canManageAdmin() || !usesSoholmsSource()) return;

    const row = allStudentRows[Number(rowIndex)];
    if (!row) return;

    let penalty;
    try {
      penalty = options.reset ? Number(row.autoPenalty ?? row.penalty) || 0 : parsePenaltyInput(rawValue);
    } catch (error) {
      adminError = error.message;
      render();
      return;
    }

    const previous = {
      penalty: row.penalty,
      finalScore: row.finalScore,
      score: row.score,
      penaltyOverridden: row.penaltyOverridden,
      autoPenalty: row.autoPenalty,
    };
    const rowSavingKey = row.localRowId;
    penaltySavingRows.add(rowSavingKey);
    adminError = '';
    row.penalty = penalty;
    row.penaltyOverridden = Math.abs(penalty - Number(row.autoPenalty ?? penalty)) >= 0.000001;
    recalculateDetailScores();
    render();

    try {
      const period = adminLoadMeta.period || getRequestPeriod(false);
      const adminKey = getBackendAdminKey();
      const response = await fetch(`${SOHOLMS_BACKEND_URL}/api/penalty-override`, {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          ...(adminKey ? { 'x-admin-key': adminKey } : {}),
        },
        body: JSON.stringify({
          periodFrom: period.from || '',
          periodTo: period.to || '',
          subject: row.subject || '',
          level: row.level || '',
          group: row.group || '',
          name: row.name || '',
          teacher: row.teacher || '',
          penalty,
          autoPenalty: Number(row.autoPenalty ?? previous.autoPenalty ?? penalty) || 0,
        }),
      });
      const data = await response.json();
      if (!response.ok || !data.ok) {
        throw new Error(data.error || 'Не удалось сохранить штраф');
      }

      row.penalty = Number(data.penalty) || 0;
      row.autoPenalty = Number(data.autoPenalty ?? row.autoPenalty ?? row.penalty) || 0;
      row.penaltyOverridden = Boolean(data.penaltyOverridden);
      adminError = row.penaltyOverridden ? 'Штраф сохранён' : 'Штраф сброшен до авторасчёта';
      recalculateDetailScores();
    } catch (error) {
      row.penalty = previous.penalty;
      row.finalScore = previous.finalScore;
      row.score = previous.score;
      row.penaltyOverridden = previous.penaltyOverridden;
      row.autoPenalty = previous.autoPenalty;
      recalculateDetailScores();
      adminError = error.message || 'Не удалось сохранить штраф';
    } finally {
      penaltySavingRows.delete(rowSavingKey);
      render();
    }
  }

  function render() {

    if (currentScope === 'teacher') {
      normalizeTeacherSelection();
    }

    // Render subject tabs
    const subjectTabsHtml = `
      ${SUBJECTS.map(s => `
      <button class="subject-btn ${currentView === 'rating' && currentSubject === s.key ? 'active' : ''}" data-subject="${s.key}">
        ${s.label}
      </button>
    `).join('')}
      <button class="subject-btn ${currentView === 'details' ? 'active' : ''}" data-view="details">Таблица</button>
    `;
    document.getElementById('subject-tabs').innerHTML = subjectTabsHtml;
    document.getElementById('subject-tabs').style.display = 'flex';

    // Render exam toggle - only available levels for current subject
    const currentSubjectConfig = SUBJECTS.find(s => s.key === currentSubject);
    const availableLevels = currentSubjectConfig?.levels || [];
    const examToggleHtml = availableLevels.map(e => `
      <button class="exam-btn ${currentExam === e ? 'active' : ''}" data-exam="${e}">
        ${e}
      </button>

      <button class="scope-btn ${currentScope === scope.key ? 'active' : ''}" data-scope="${scope.key}">
        ${scope.label}
      </button>
    `).join('');
    document.getElementById('scope-toggle').innerHTML = scopeToggleHtml;
    document.querySelector('.rating-controls').style.display = currentView === 'rating' ? 'flex' : 'none';

    const teacherNames = getCurrentTeacherNames();
    const teacherFilterHtml = currentScope === 'teacher' ? `
      <select class="teacher-select" id="teacher-select" ${teacherNames.length === 0 ? 'disabled' : ''}>
        ${teacherNames.map((name, index) => `
          <option value="${index}" ${currentTeacher === name ? 'selected' : ''}>${escapeHtml(name)}</option>
        `).join('')}
      </select>
    ` : '';
    document.getElementById('teacher-filter').innerHTML = teacherFilterHtml;

    // Update title
    if (adminSection === 'pdfReports' && !canManageAdmin()) {
      adminSection = 'details';
    }

    const adminTitle = adminSection === 'teacherRating'
      ? 'Рейтинг преподов'
      : adminSection === 'dailyProgress'
        ? 'Процент по дням'
        : adminSection === 'pdfReports'
          ? 'PDF'
          : 'Детальная статистика';
    const adminSubtitle = adminSection === 'teacherRating'
      ? 'Средние по группам'
      : adminSection === 'dailyProgress'
        ? 'Решение по датам'
        : adminSection === 'pdfReports'
          ? 'Отчёты'
          : 'Для преподавателей';
    document.querySelector('.main-title').textContent = currentView === 'details' ? (canManageAdmin() ? 'АДМИН' : 'ТАБЛИЦА') : 'РЕЙТИНГ';
    const subjectLabel = SUBJECTS.find(s => s.key === currentSubject)?.label || '';
    document.getElementById('subject-label').textContent = currentView === 'details' ? adminTitle : subjectLabel;
    const teacherLabel = currentScope === 'teacher' && currentTeacher ? ` | ${currentTeacher}` : '';
    const viewLabel = currentView === 'details' ? ` | ${adminSubtitle}` : teacherLabel;
    document.getElementById('exam-label').textContent = currentView === 'details' ? viewLabel.replace(' | ', '') : `${currentExam}${viewLabel}`;

    if (currentView === 'details') {
      document.getElementById('columns-container').innerHTML = renderDetailsView();
      return;
    }

    // Get data
    const levelData = currentScope === 'teacher'
      ? teacherData?.[currentSubject]?.[currentExam]?.[currentTeacher]
      : appData[currentSubject]?.[currentExam];
    if (!levelData) {
      document.getElementById('columns-container').innerHTML = '<p>Нет данных</p>';
      return;
    }

    // Render columns
    const placeLabel = currentScope === 'teacher' ? 'У ПРЕПОД.' : 'В ШКОЛЕ';
    const columnsHtml = `
      ${renderRatingColumn('legends', levelData.legends, placeLabel)}
      ${renderRatingColumn('champs', levelData.champs, placeLabel)}
      ${renderRatingColumn('starters', levelData.starters, placeLabel)}
    `;

  function initEventListeners() {
    document.getElementById('subject-tabs').addEventListener('click', (e) => {
      if (e.target.classList.contains('subject-btn')) {
        if (e.target.dataset.view === 'details') {
          currentView = 'details';
          render();
          return;
        }

        const newSubject = e.target.dataset.subject;
        if (currentSubject !== newSubject) {
          currentSubject = newSubject;
          // When switching subjects, select first available level
          const subjectConfig = SUBJECTS.find(s => s.key === currentSubject);
          if (subjectConfig && !subjectConfig.levels.includes(currentExam)) {
            currentExam = subjectConfig.levels[0];
          }
        }
        currentView = 'rating';
        render();
      }
    });

    document.getElementById('exam-toggle').addEventListener('click', (e) => {
      if (e.target.classList.contains('exam-btn')) {
        const newExam = e.target.dataset.exam;
        if (currentExam !== newExam) {
          currentExam = newExam;
          render();
        }
      }
    });

    document.getElementById('scope-toggle').addEventListener('click', (e) => {
      if (e.target.classList.contains('scope-btn')) {
        const newScope = e.target.dataset.scope;
        if (currentScope !== newScope) {
          currentScope = newScope;
          render();
        }
      }
    });

    document.getElementById('teacher-filter').addEventListener('change', (e) => {
      if (e.target.classList.contains('teacher-select')) {
        const teacherNames = getCurrentTeacherNames();
        currentTeacher = teacherNames[Number(e.target.value)] || '';
        render();
      }
    });

    document.getElementById('columns-container').addEventListener('change', (e) => {
      if (e.target.dataset.penaltyIndex !== undefined) {
        savePenaltyOverride(e.target.dataset.penaltyIndex, e.target.value);
        return;
      }

      const filter = e.target.dataset.detailFilter;
      if (!filter) return;

      const rows = getCurrentDetailRows();
      const index = Number(e.target.value);
      if (filter === 'detailSubject') {
        const options = uniqueSorted(allStudentRows.map((row) => row.subject));
        detailSubject = e.target.value === '' ? '' : options[index] || '';
      }
      if (filter === 'detailExam') {
        const options = uniqueSorted(allStudentRows.map((row) => row.level));
        detailExam = e.target.value === '' ? '' : options[index] || '';
      }
      if (filter === 'detailTeacher') {
        const options = uniqueSorted(rows.map((row) => row.teacher));
        detailTeacher = e.target.value === '' ? '' : options[index] || '';
      }
      if (filter === 'detailGroup') {
        const options = uniqueSorted(rows.map((row) => row.group));
        detailGroup = e.target.value === '' ? '' : options[index] || '';
      }
      if (filter === 'detailStudent') {
        const options = uniqueSorted(rows.map((row) => row.name));
        detailStudent = e.target.value === '' ? '' : options[index] || '';
      }
      if (filter === 'teacherRatingSubject') {
        const options = uniqueSorted(allStudentRows.map((row) => row.subject));
        teacherRatingSubject = e.target.value === '' ? '' : options[index] || '';
      }
      if (filter === 'teacherRatingExam') {
        const options = uniqueSorted(allStudentRows.map((row) => row.level));
        teacherRatingExam = e.target.value === '' ? '' : options[index] || '';
      }
      if (filter === 'dailyProgressSubject') {
        const options = uniqueSorted(allStudentRows.map((row) => row.subject));
        dailyProgressSubject = e.target.value === '' ? '' : options[index] || '';
      }
      if (filter === 'dailyProgressExam') {
        const options = uniqueSorted(allStudentRows.map((row) => row.level));
        dailyProgressExam = e.target.value === '' ? '' : options[index] || '';
      }
      if (filter === 'dailyProgressTeacher') {
        const options = uniqueSorted(getDailyProgressBaseRows().map((row) => row.teacher));
        dailyProgressTeacher = e.target.value === '' ? '' : options[index] || '';
      }
      if (filter === 'pdfStudent') {
        const options = groupedRowsByStudent(allStudentRows).map(([studentName]) => studentName);
        pdfStudent = e.target.value === '' ? '' : options[index] || '';
      }
      render();
    });

    document.getElementById('columns-container').addEventListener('submit', (e) => {
      if (e.target.id !== 'admin-login-form') return;
      e.preventDefault();

      const input = document.getElementById('admin-password-input');
      loginAdmin(input?.value || '');
    });

    document.getElementById('columns-container').addEventListener('click', (e) => {
      if (e.target.dataset.penaltyResetIndex !== undefined) {
        savePenaltyOverride(e.target.dataset.penaltyResetIndex, '', { reset: true });
        return;
      }

      if (e.target.id === 'admin-logout-btn') {
        adminToken = '';
        adminRole = '';
        adminError = '';
        allStudentRows = [];
        adminLoadMeta = {
          period: null,
          groupCount: 0,
          rowCount: 0,
          errors: [],
          missingConfigNames: [],
        };
        sessionStorage.removeItem('adminToken');
        sessionStorage.removeItem('adminRole');
        render();
        return;
      }

      if (e.target.id === 'admin-period-apply') {
        if (!canChangePeriod()) return;
        applyAdminPeriod();
        return;
      }

      if (e.target.id === 'admin-period-reset') {
        if (!canChangePeriod()) return;
        resetAdminPeriod();
        return;
      }

      if (e.target.id === 'admin-cache-clear') {
        if (!canManageAdmin()) return;
        clearBackendCacheAndReload();
        return;
      }

      const dataSource = e.target.dataset.dataSource;
      if (dataSource) {
        switchDataSource(dataSource);
        return;
      }

      if (e.target.id === 'pdf-one-student') {
        if (!canManageAdmin()) return;
        openPdfReport(pdfStudent);
        return;
      }

      if (e.target.id === 'pdf-all-students') {
        if (!canManageAdmin()) return;
        openPdfReport('');
        return;
      }

      if (e.target.id === 'telegram-one-student') {
        if (!canManageAdmin()) return;
        sendTelegramReport(pdfStudent);
        return;
      }

      if (e.target.id === 'telegram-all-students') {
        if (!canManageAdmin()) return;
        sendTelegramReport('');
        return;
      }

      const adminSectionKey = e.target.dataset.adminSection;
      if (adminSectionKey) {
        if (adminSectionKey === 'pdfReports' && !canManageAdmin()) return;
        adminSection = adminSectionKey;
        render();
        return;
      }

      const teacherRatingSortKeyValue = e.target.dataset.teacherRatingSort;
      if (teacherRatingSortKeyValue) {
        if (teacherRatingSortKey === teacherRatingSortKeyValue) {
          teacherRatingSortDirection = teacherRatingSortDirection === 'asc' ? 'desc' : 'asc';
        } else {
          const numericKeys = ['rating', 'groupCount', 'studentCount', 'bestGroupScore', 'worstGroupScore'];
          teacherRatingSortKey = teacherRatingSortKeyValue;
          teacherRatingSortDirection = teacherRatingSortKeyValue === 'place' || !numericKeys.includes(teacherRatingSortKeyValue) ? 'asc' : 'desc';
        }
        render();
        return;
      }

      const dailyProgressSortKeyValue = e.target.dataset.dailyProgressSort;
      if (dailyProgressSortKeyValue) {
        if (dailyProgressSortKey === dailyProgressSortKeyValue) {
          dailyProgressSortDirection = dailyProgressSortDirection === 'asc' ? 'desc' : 'asc';
        } else {
          const descKeys = ['averageScore', 'filledCount', 'studentCount', 'filledPercent'];
          dailyProgressSortKey = dailyProgressSortKeyValue;
          dailyProgressSortDirection = descKeys.includes(dailyProgressSortKeyValue) ? 'desc' : 'asc';
        }
        render();
        return;
      }

      const sortKey = e.target.dataset.sort;
      if (!sortKey) return;

      if (detailSortKey === sortKey) {
        detailSortDirection = detailSortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        detailSortKey = sortKey;
        detailSortDirection = 'asc';
      }
      render();
    });
  }

  async function loginAdmin(password) {
    adminError = '';
    adminLoading = true;
    render();

    try {
      const response = await fetch(`${PROXY_URL}?mode=login&password=${encodeURIComponent(password)}&_t=${Date.now()}`);
      const data = await response.json();

      if (!data.ok || !data.token) {
        throw new Error('Неверный пароль');
      }

      adminToken = data.token;
      adminRole = data.role === 'teacher' ? 'teacher' : 'admin';
      if (!canManageAdmin() && adminSection === 'pdfReports') {
        adminSection = 'details';
      }
      sessionStorage.setItem('adminToken', adminToken);
      sessionStorage.setItem('adminRole', adminRole);
      adminLoading = false;
      await loadAdminData();
    } catch (error) {
      adminToken = '';
      adminRole = '';
      sessionStorage.removeItem('adminToken');
      sessionStorage.removeItem('adminRole');
      adminError = error.message || 'Не удалось войти';
    } finally {
      adminLoading = false;
      render();
    }
  }

  async function loadAdminData() {
    if (!adminToken || adminLoading) return;

    adminLoading = true;
    adminError = '';
    render();

    try {
      const response = await fetch(
        usesSoholmsSource()
          ? buildSoholmsRatingsUrl(false)
          : `${PROXY_URL}?mode=admin&token=${encodeURIComponent(adminToken)}&_t=${Date.now()}`
      );
      const data = await response.json();

      if (!data.ok || !Array.isArray(data.rows)) {
        throw new Error(data.error === 'unauthorized' ? 'Сессия истекла, войдите заново' : 'Не удалось загрузить админские данные');
      }

      allStudentRows = parseApiRows(data.rows);
      adminLoadMeta = {
        period: data.period || null,
        groupCount: Array.isArray(data.groups) ? data.groups.length : 0,
        rowCount: data.rows.length,
        errors: Array.isArray(data.errors) ? data.errors : [],
        missingConfigNames: Array.isArray(data.missingConfigNames) ? data.missingConfigNames : [],
      };
    } catch (error) {
      allStudentRows = [];
      adminLoadMeta = {
        period: null,
        groupCount: 0,
        rowCount: 0,
        errors: [],
        missingConfigNames: [],
      };
      if (!usesSoholmsSource()) {
        adminToken = '';
        adminRole = '';
        sessionStorage.removeItem('adminToken');
        sessionStorage.removeItem('adminRole');
      }
      adminError = error.message || 'Не удалось загрузить админские данные';
    } finally {
      adminLoading = false;
      render();
    }
  }

  async function loadData(options = {}) {
    const silent = Boolean(options.silent);
    const force = Boolean(options.force);
    if (dataLoading) return;
    dataLoading = true;
    try {
      if (usesSoholmsSource()) {
        const response = await fetch(buildSoholmsRatingsUrl(true, { cacheBust: force, refresh: force }));
        const data = await response.json();

        if (!response.ok || !data.ok || !Array.isArray(data.rows)) {
          throw new Error(data.error || 'Не удалось загрузить данные Soholms');
        }

        if (Array.isArray(data.errors) && data.errors.length > 0) {
          console.warn('Ошибки загрузки Soholms:', data.errors);
        }

        const allStudents = parseApiRows(data.rows);
        writePublicRatingsCache(allStudents);
        if (allStudents.length === 0 && Array.isArray(data.errors) && data.errors.length > 0) {
          throw new Error(`Soholms вернул 0 учеников. Первая ошибка: ${data.errors[0].error || 'неизвестно'}`);
        }

        applyPublicStudents(allStudents, { silent });
        console.log('Загружено студентов из Soholms:', allStudents.length);

        if (!window.listenersInitialized) {
          initEventListeners();
          window.listenersInitialized = true;
        }
        updateLastUpdateTime();
        document.getElementById('refresh-btn').classList.remove('loading');
        return;
      }

      // Создаём параллельные fetch запросы вместо последовательных
      const fetchPromises = [];

      for (const subject of SUBJECTS) {
        for (const level of subject.levels) {
          const url = buildApiUrl(subject.key, level) + (force ? `&_t=${Date.now()}` : '');
          fetchPromises.push(
            fetch(url)
              .then(response => {
                if (!response.ok) {
                  console.warn(`Ошибка загрузки ${subject.label} ${level}: ${response.status}`);
                  return null;
                }
                return response.text().then(text => ({ text, subject, level }));
              })
              .catch(e => {
                console.warn(`Ошибка запроса ${subject.label} ${level}:`, e.message);
                return null;
              })
          );
        }
      }

      // Ждём все запросы параллельно
      const responses = await Promise.all(fetchPromises);
      const allStudents = [];

      for (const response of responses) {
        if (!response) continue;
        try {
          const trimmedText = response.text.trim();
          let students;

          if (trimmedText.startsWith('{')) {
            const data = JSON.parse(trimmedText);
            if (!data.ok || !Array.isArray(data.rows)) {
              throw new Error(data.error || 'Неожиданный формат данных');
            }
            students = parseApiRows(data.rows);
          } else {
            const gvizJson = extractGvizJson(response.text);
            students = parseGvizData(gvizJson, response.subject.key, response.level);
          }

          allStudents.push(...students);
        } catch (e) {
          console.warn(`Ошибка парсинга ${response.subject.label} ${response.level}:`, e.message);
        }
      }

      if (allStudents.length === 0) {
        throw new Error('Данные не найдены в таблицах');
      }

      appData = groupAndSort(allStudents);
      teacherData = groupTeacherRatings(allStudents);
      writePublicRatingsCache(allStudents);
      console.log('Загружено студентов:', allStudents.length);
      console.log('По предметам:', Object.keys(appData || {}).map(k => `${k}: ${Object.keys(appData[k]).length} уровней`));

      // Выводим список студентов с null в cells[10]
      if (globalNullScoreStudents.length > 0) {
        console.log('\n\n' + '='.repeat(60));
        console.log('❌ СТУДЕНТЫ С NULL В CELLS[10]:');
        console.log('='.repeat(60));
        globalNullScoreStudents.forEach(s => {
          console.log(`${s.name} — ${s.subject} ${s.level}`);
        });
        console.log(`Всего: ${globalNullScoreStudents.length}`);
        console.log('='.repeat(60) + '\n');
      } else {
        console.log('✅ Все студенты загружены корректно!');
      }

      render();
      if (!window.listenersInitialized) {
        initEventListeners();
        window.listenersInitialized = true;
      }
      updateLastUpdateTime();
      document.getElementById('refresh-btn').classList.remove('loading');
    } catch (error) {
      console.error('Ошибка загрузки:', error);
      if (!silent) {
        document.getElementById('columns-container').innerHTML = `
          <div style="color: white; text-align: center; padding: 40px;">
            <p>Ошибка загрузки: ${error.message}</p>
          </div>
        `;
      }
      document.getElementById('refresh-btn').classList.remove('loading');
    } finally {
      dataLoading = false;
    }
  }

  function updateLastUpdateTime() {
    const now = new Date();
    const timeStr = now.toLocaleString('ru-RU', {
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit'
    });
    localStorage.setItem('lastUpdateTime', timeStr);
    document.getElementById('last-update-time').textContent = timeStr;
  }

  function displayLastUpdateTime() {
    const savedTime = localStorage.getItem('lastUpdateTime');
    if (savedTime) {
      document.getElementById('last-update-time').textContent = savedTime;
    }
  }

  function startAutoRefresh() {
    if (!AUTO_REFRESH_MS || AUTO_REFRESH_MS < 60000) return;
    window.setInterval(() => {
      if (document.hidden) return;
      refreshData({ silent: true });
    }, AUTO_REFRESH_MS);
  }

  async function refreshData(options = {}) {
    const previousDataSource = selectedDataSource;
    const settingsPromise = loadDataSourceSettings();
    await loadData(options);
    await settingsPromise;

    if (selectedDataSource !== previousDataSource) {
      appData = null;
      teacherData = null;
      if (!hydratePublicRatingsFromCache()) {
        renderLoadingShell();
      }
      await loadData({ ...options, force: true, silent: false });
    }
  }

  function checkLogoBrowser() {
    const logo = document.getElementById('logo');
    if (!logo) return;

    const showLogo = () => {
      logo.style.display = 'block';
    };
    const hideMissingLogo = () => {
      console.log('Логотип не найден (logoplanka.png)');
      logo.style.display = 'none';
    };

    if (logo.complete) {
      if (logo.naturalWidth > 0) showLogo();
      else hideMissingLogo();
      return;
    }

    logo.addEventListener('load', showLogo, { once: true });
    logo.addEventListener('error', hideMissingLogo, { once: true });
  }

  async function initApp() {
    displayLastUpdateTime();
    checkLogoBrowser();
    const hasCachedData = hydratePublicRatingsFromCache();
    if (!hasCachedData) {
      renderLoadingShell();
    }
    if (!window.listenersInitialized) {
      initEventListeners();
      window.listenersInitialized = true;
    }
    await refreshData({ silent: hasCachedData });
    startAutoRefresh();
  }

  initApp();

  // Обработчик кнопки обновить
  document.getElementById('refresh-btn').addEventListener('click', () => {
    document.getElementById('refresh-btn').classList.add('loading');
    refreshData({ force: true });
  });
</script>
